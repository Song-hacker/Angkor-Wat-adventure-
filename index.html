<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>អ្នកផ្សងព្រេងអង្គរ V12៖ តួអង្គរាងធំច្បាស់ភ្នែក</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Khmer OS Battambang', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        h1 {
            color: #fbbf24;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .game-wrapper {
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fbbf24;
            background-color: #111827;
            display: block;
        }

        /* ផ្ទាំងដើមជ្រើសរើសឈ្មោះ និងតួអង្គលេង */
        .setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 11, 22, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .setup-box {
            background: #1e2538;
            border: 3px solid #fbbf24;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .setup-box h2 {
            color: #fbbf24;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .setup-box input {
            width: 100%;
            padding: 12px;
            background: #111424;
            border: 2px solid #4f46e5;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .avatar-item {
            background: #111424;
            border: 3px solid #2e324e;
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .avatar-item img {
            width: 70px;
            height: 85px;
            object-fit: contain;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 5px;
        }
        .avatar-item .label { font-size: 16px; font-weight: bold; color: #9ca3af; }
        .avatar-item:hover { border-color: #818cf8; transform: scale(1.05); }
        .avatar-item.selected {
            border-color: #fbbf24;
            background: #4f46e5;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }
        .avatar-item.selected .label { color: white; }
        
        .start-btn {
            background: #fbbf24;
            color: #050508;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .start-btn:hover { background: #f59e0b; }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .game-over-overlay h2 {
            color: #ef4444;
            font-size: 40px;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .game-over-overlay p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .restart-btn {
            background: #fbbf24;
            color: #050508;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .restart-btn:hover { background: #f59e0b; }

        .instructions {
            margin-top: 10px;
            color: #9ca3af;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="setup-overlay" id="setupOverlay">
        <div class="setup-box">
            <h2>🇰🇭 ជ្រើសរើសតួអង្គផ្សងព្រេង 🇰🇭</h2>
            <input type="text" id="playerNameInput" placeholder="សូមបញ្ចូលឈ្មោះរបស់អ្នក..." maxlength="12">
            <p style="font-size: 14px; color: #9ca3af; margin-bottom: 15px;">សូមជ្រើសរើសតួអង្គដែលអ្នកស្រឡាញ់៖</p>
            
            <div class="avatar-grid">
                <div class="avatar-item selected" onclick="selectAvatar(this, 'male')">
                    <img src="player_male.png" alt="ប្រុស" onerror="this.src='https://placehold.co/60x90/007bff/ffffff?text=Male'">
                    <span class="label">តួអង្គប្រុស</span>
                </div>
                <div class="avatar-item" onclick="selectAvatar(this, 'female')">
                    <img src="player_female.png" alt="ស្រី" onerror="this.src='https://placehold.co/60x90/e83e8c/ffffff?text=Female'">
                    <span class="label">តួអង្គស្រី</span>
                </div>
            </div>
            <button class="start-btn" onclick="startGame()">ចូលលេងហ្គេម</button>
        </div>
    </div>

    <h1>🇰🇭 អ្នកផ្សងព្រេងអង្គរ៖ ពិភពលោកគ្មានទីបញ្ចប់ 🇰🇭</h1>
    
    <div class="game-wrapper">
        <div class="game-over-overlay" id="gameOverOverlay">
            <h2>ហ្គេមត្រូវបានបញ្ចប់!</h2>
            <p id="finalScoreText">ពិន្ទុទទួលបាន៖ 0 កាក់</p>
            <button class="restart-btn" onclick="restartGame()">លេងឡើងវិញ</button>
        </div>
        <canvas id="gameCanvas" width="800" height="440"></canvas>
    </div>

    <div class="instructions">
        បញ្ជា៖ ចុចព្រួញឆ្វេងស្តាំ <b>← / →</b> ដើម្បីដើរ | ចុចព្រួញឡើងលើ <b>↑</b> ឬ <b>Spacebar</b> ដើម្បីលោត
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let chosenGender = "male"; 
    let finalPlayerName = "អ្នកលេង";
    let isGameRunning = false;
    let score = 0;

    let cameraX = 0;
    let nextSpawnX = 800; 

    const gameImages = {
        male: new Image(),
        female: new Image(),
        background: new Image(),
        enemy: new Image(),
        luckyblock: new Image()
    };
    
    gameImages.male.src = 'player_male.png';
    gameImages.female.src = 'player_female.png';
    gameImages.background.src = 'bg.png';
    gameImages.enemy.src = 'enemy.png';
    gameImages.luckyblock.src = 'luckyblock.png';

    function selectAvatar(element, gender) {
        const items = document.querySelectorAll('.avatar-item');
        items.forEach(item => item.classList.remove('selected'));
        element.classList.add('selected');
        chosenGender = gender; 
    }

    function startGame() {
        const nameInput = document.getElementById('playerNameInput').value.trim();
        if(nameInput !== "") finalPlayerName = nameInput;
        document.getElementById('setupOverlay').style.display = 'none';
        initGame();
    }

    const gravity = 0.55;
    let player, platforms, luckyBlocks, coins, enemies;
    const keys = { right: false, left: false, up: false };

    function initGame() {
        score = 0;
        cameraX = 0;
        nextSpawnX = 800;
        isGameRunning = true;
        document.getElementById('gameOverOverlay').style.display = 'none';

        // 🛠️ បានកែសម្រួល៖ បើកទទឹងឱ្យធំផ្ដេក (width: 80) ដើម្បីស្រួលមើល និងរក្សាកម្ពស់ទាប (height: 55)
        player = {
            x: 100,
            y: 250,
            width: 80,  
            height: 55,
            dx: 0,
            dy: 0,
            speed: 5.5,
            jumpForce: 13,
            grounded: false,
            facing: 'right'
        };

        platforms = [
            { x: 0, y: 380, width: 1200, height: 60, type: 'ground' }
        ];

        luckyBlocks = [
            { x: 400, y: 240, width: 44, height: 44, hit: false, bumpY: 0 },
            { x: 650, y: 200, width: 44, height: 44, hit: false, bumpY: 0 }
        ];

        coins = [];
        enemies = [
            { x: 550, y: 320, width: 60, height: 60, speed: 1.5, minX: 350, maxX: 750 }
        ];

        gameLoop();
    }

    document.addEventListener("keydown", (e) => {
        if(!isGameRunning) return;
        if (e.key === "ArrowRight" || e.key === "d") { keys.right = true; player.facing = 'right'; }
        if (e.key === "ArrowLeft" || e.key === "a") { keys.left = true; player.facing = 'left'; }
        if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.up = true;
    });

    document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
        if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
        if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.up = false;
    });

    function checkAndGenerateMap() {
        while (nextSpawnX < cameraX + canvas.width + 500) {
            let rand = Math.random();
            let platformWidth = Math.random() * 260 + 150;
            let gap = Math.random() * 75 + 35; 

            platforms.push({
                x: nextSpawnX + gap,
                y: 380,
                width: platformWidth,
                height: 60,
                type: 'ground'
            });

            if (rand < 0.5) {
                luckyBlocks.push({
                    x: nextSpawnX + gap + (platformWidth / 2) - 22,
                    y: 240,
                    width: 44,
                    height: 44,
                    hit: false,
                    bumpY: 0
                });
            }

            if (rand > 0.4 && rand < 0.85) {
                let enemyX = nextSpawnX + gap + 20;
                enemies.push({
                    x: enemyX,
                    y: 320,
                    width: 60,
                    height: 60,
                    speed: 1.2 + (Math.random() * 0.8),
                    minX: nextSpawnX + gap,
                    maxX: nextSpawnX + gap + platformWidth - 65
                });
            }

            nextSpawnX += platformWidth + gap;
        }
    }

    function drawBackground() {
        if (gameImages.background.complete && gameImages.background.width > 0) {
            let bgScrollX = -(cameraX * 0.3) % canvas.width;
            ctx.drawImage(gameImages.background, bgScrollX, 0, canvas.width, canvas.height);
            ctx.drawImage(gameImages.background, bgScrollX + canvas.width, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#111827";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function drawPlatforms() {
        platforms.forEach(p => {
            ctx.fillStyle = "rgba(43, 35, 24, 0.9)";
            ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            ctx.strokeStyle = "#fbbf24";
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x - cameraX, p.y, p.width, p.height);
            ctx.fillStyle = "#10b981";
            ctx.fillRect(p.x - cameraX, p.y, p.width, 5);
        });
    }

    function drawLuckyBlocks() {
        luckyBlocks.forEach(b => {
            if (gameImages.luckyblock.complete && gameImages.luckyblock.width > 0) {
                ctx.save();
                ctx.translate(0, b.bumpY);
                
                if (b.hit) {
                    ctx.filter = "grayscale(1) brightness(0.7)"; 
                } else {
                    ctx.filter = "grayscale(1) brightness(1.3)"; 
                }
                
                ctx.drawImage(gameImages.luckyblock, b.x - cameraX, b.y, b.width, b.height);
                ctx.restore();
            } else {
                ctx.save();
                ctx.translate(0, b.bumpY);
                ctx.fillStyle = b.hit ? "#6b7280" : "#d1d5db";
                ctx.fillRect(b.x - cameraX, b.y, b.width, b.height);
                ctx.restore();
            }
        });
    }

    function drawPlayer() {
        let currentPlayerImg = chosenGender === 'male' ? gameImages.male : gameImages.female;
        
        if (currentPlayerImg.complete && currentPlayerImg.width > 0) {
            ctx.save();
            if (player.facing === 'left') {
                ctx.translate(player.x - cameraX + player.width, player.y);
                ctx.scale(-1, 1);
                ctx.drawImage(currentPlayerImg, 0, 0, player.width, player.height);
            } else {
                ctx.translate(player.x - cameraX, player.y);
                ctx.drawImage(currentPlayerImg, 0, 0, player.width, player.height);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = chosenGender === 'male' ? "#3b82f6" : "#ec4899";
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
        }
    }

    function drawEnemies() {
        enemies.forEach(e => {
            if (gameImages.enemy.complete && gameImages.enemy.width > 0) {
                ctx.drawImage(gameImages.enemy, e.x - cameraX, e.y, e.width, e.height);
            } else {
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(e.x - cameraX, e.y, e.width, e.height);
            }
        });
    }

    function drawCoins() {
        coins.forEach((c, index) => {
            ctx.fillStyle = "#fbbf24";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(c.x - cameraX, c.y, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            c.y += c.dy; 
            c.dy += 0.4; 
            c.life--;
            if(c.life <= 0) coins.splice(index, 1);
        });
    }

    function drawUI() {
        // របារឈ្មោះតួអង្គខាងឆ្វេង
        ctx.fillStyle = "rgba(17, 24, 39, 0.85)";
        ctx.fillRect(15, 15, 230, 45);
        ctx.strokeStyle = "#fbbf24";
        ctx.lineWidth = 2;
        ctx.strokeRect(15, 15, 230, 45);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px 'Khmer OS Battambang'";
        let currentLabel = chosenGender === 'male' ? "🤵 ប្រុស" : "👩 ស្រី";
        ctx.fillText(`${currentLabel} : ${finalPlayerName}`, 25, 42);
        
        // របារបង្ហាញកាក់ ពណ៌ខ្មៅដិតច្បាស់ល្អ
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; 
        ctx.fillRect(canvas.width - 160, 15, 145, 45);
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width - 160, 15, 145, 45);
        
        ctx.fillStyle = "#000000"; 
        ctx.font = "bold 18px 'Khmer OS Battambang'";
        ctx.textAlign = "right";
        ctx.fillText(`🪙 កាក់៖ ${score}`, canvas.width - 25, 43);
        ctx.textAlign = "left";
    }

    function update() {
        if (keys.right) player.dx = player.speed;
        else if (keys.left) player.dx = -player.speed;
        else player.dx = 0;

        if (keys.up && player.grounded) { player.dy = -player.jumpForce; player.grounded = false; }

        player.dy += gravity; player.x += player.dx; player.y += player.dy;
        if (player.x < cameraX) player.x = cameraX;
        if (player.x - cameraX > 350) cameraX = player.x - 350;

        checkAndGenerateMap();
        if (player.y > canvas.height) gameOver();

        player.grounded = false;
        platforms.forEach(p => {
            // 🛠️ បានកែសម្រួលប្រព័ន្ធទប់តួអង្គ (Collision) ឱ្យត្រូវនឹងរូបរាងធំថ្មី
            if (player.x + player.width * 0.2 < p.x + p.width && player.x + player.width * 0.8 > p.x &&
                player.y + player.height >= p.y && player.y + player.height <= p.y + 15 && player.dy >= 0) {
                player.y = p.y - player.height; player.dy = 0; player.grounded = true;
            }
        });

        luckyBlocks.forEach(b => {
            if(b.bumpY < 0) b.bumpY += 1;
            if (player.x < b.x + b.width && player.x + player.width > b.x &&
                player.y <= b.y + b.height && player.y >= b.y + b.height - 12 && player.dy < 0) {
                player.dy = 2; 
                if (!b.hit) {
                    b.hit = true; b.bumpY = -10; score += 1;
                    coins.push({ x: b.x + b.width/2, y: b.y - 15, dy: -7, life: 30 });
                }
            }
        });

        enemies.forEach((e, index) => {
            e.x += e.speed;
            if (e.x < e.minX || e.x > e.maxX) e.speed = -e.speed;

            if (player.x < e.x + e.width && player.x + player.width > e.x &&
                player.y + player.height >= e.y && player.y <= e.y + e.height) {
                if(player.dy > 0 && player.y + player.height <= e.y + 18) {
                    enemies.splice(index, 1); player.dy = -6; score += 2; 
                } else {
                    gameOver();
                }
            }
        });

        if(platforms.length > 20) platforms.shift();
        if(luckyBlocks.length > 15) luckyBlocks.shift();
        if(enemies.length > 15) enemies.shift();
    }

    function gameOver() {
        isGameRunning = false;
        document.getElementById('finalScoreText').innerText = `ពិន្ទុទទួលបាន៖ ${score} កាក់`;
        document.getElementById('gameOverOverlay').style.display = 'flex';
    }

    function restartGame() { initGame(); }

    function gameLoop() {
        if (!isGameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        drawPlatforms();
        drawLuckyBlocks();
        drawEnemies();
        drawCoins();
        drawPlayer();
        drawUI();
        update();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
